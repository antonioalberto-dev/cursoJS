<!DOCTYPE html>
<html lang="pt-BR\">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de String</title>
</head>

<body>
    <script>
        const nome = prompt('Informe o seu nome: ');
        document.body.innerHTML = `O seu nome é: ${nome} </br>`;
        document.body.innerHTML += `Seu nome tem ${nome.length} </br>`;
        document.body.innerHTML += `A segunda letra do seu nome é: ${nome.charAt(1)} </br>`;
        document.body.innerHTML += `O primeiro indice da letra 'o' no seu nome: ${nome.indexOf('o')} </br>`
        document.body.innerHTML += `O ultimo indice da letra 'a' no seu nome: ${nome.lastIndexOf('a')}</br>`;
        document.body.innerHTML += `As 3 ultimas letras do seu nome: ${nome.slice(-3)}`;
        document.body.innerHTML += `As palavras do seu nome são: ${nome.split(' ')}</br>`
        document.body.innerHTML += `Seu nome com letras maiusculas: ${nome.toUpperCase()} </br>`
        document.body.innerHTML += `Seu nome com letras maiusculas: ${nome.toLowerCase()} </br>`
    </script>
</body>

</html>
